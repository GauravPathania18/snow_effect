<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8" />
  <title>Snow Effect with Wind Modes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- WIND MODE CONTROL PANEL -->
  <div id="snow-controls">
    <button data-mode="calm">Calm</button>
    <button data-mode="windy">Windy</button>
    <button data-mode="blizzard">Blizzard</button>
  </div>

  <!-- SNOW SCRIPT BUNDLE -->
 <script src="./dist/ui-effects.min.js"></script>

<script>
  // 1. Create the Let It Snow toggle button
  UIEffects.createSnowButton();

  // 2. Access the snow instance
  const snow = UIEffects.effectManager.effects.snow;

  // 3. Wire wind mode buttons
  document.querySelectorAll("#snow-controls button").forEach(btn => {
    btn.addEventListener("click", () => {
      snow.setWindMode(btn.dataset.mode);
    });
  });
</script>



</body>
</html>
